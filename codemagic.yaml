# Codemagic CI/CD for UNIQ Performance mobile app.
# App Store Connect API key: Team integrations -> Developer Portal -> Uniq
#
# Code signing (Team settings -> Code signing identities -> iOS certificates):
# Generate certificate -> Apple Distribution -> API key "Uniq"
# Reference name MUST be: uniq_distribution
# (Provisioning profile is created/fetched from Apple during each build.)

workflows:
  flutter-ios-testflight:
    name: Flutter iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Uniq
    environment:
      ios_signing:
        certificates:
          - uniq_distribution
      vars:
        BUNDLE_ID: com.uniqperformance.mobile
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch App Store profile from Apple
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
