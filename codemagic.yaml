# Codemagic CI/CD for UNIQ Performance mobile app.
# App Store Connect API key: Team integrations -> Developer Portal -> Uniq
#
# Code signing setup (Team settings -> Code signing identities):
# 1. iOS certificates -> Generate certificate -> Apple Distribution -> Uniq
#    Reference name: uniq_distribution
# 2. iOS provisioning profiles -> Fetch profiles -> com.uniqperformance.mobile (App Store)
#    Reference name: uniq_appstore -> click "Download selected" (must appear in team list)

workflows:
  flutter-ios-testflight:
    name: Flutter iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Uniq
    environment:
      ios_signing:
        provisioning_profiles:
          - uniq_appstore
        certificates:
          - uniq_distribution
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
