# Codemagic CI/CD for UNIQ Performance mobile app.
# App Store Connect API key in Team integrations -> Developer Portal: Uniq
#
# Optional (recommended after first successful build):
# Add secret env var CERTIFICATE_PRIVATE_KEY in group "code-signing"
# so the same distribution certificate is reused across builds.

workflows:
  flutter-ios-testflight:
    name: Flutter iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Uniq
    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.uniqperformance.mobile
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files from Apple
        script: |
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            openssl genrsa -out /tmp/ios_distribution_private_key.pem 2048
            export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/ios_distribution_private_key.pem)"
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
