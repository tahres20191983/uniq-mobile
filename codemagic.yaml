# Codemagic CI/CD for UNIQ Performance mobile app.
# App Store Connect API key: Team integrations -> Developer Portal -> Uniq
#
# Required once in Codemagic (Team settings -> Environment variables):
#   Group name: code-signing
#   Variable: CERTIFICATE_PRIVATE_KEY (secret) = contents of ios_distribution_private_key.pem
#
# Before first build with a new key, revoke old Apple Distribution certs at:
# https://developer.apple.com/account/resources/certificates/list

workflows:
  flutter-ios-testflight:
    name: Flutter iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Uniq
    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.uniqperformance.mobile
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files from Apple
        script: |
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: Add secret env var CERTIFICATE_PRIVATE_KEY in Codemagic group 'code-signing'."
            exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
